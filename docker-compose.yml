version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: your_mysql_password
      DB_NAME: cabinet_donneville
      JWT_SECRET: votre_cle_secrete_ici
    depends_on:
      - db

  frontend:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - backend

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: your_mysql_password
      MYSQL_DATABASE: cabinet_donneville
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data: